spring.application.name=paymentService
server.port=5000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

asaas.api.url=https://sandbox.asaas.com/api/v3
asaas.api.key=$aact_hmlg_000MzkwODA2MWY2OGM3MWRlMDU2NWM3MzJlNzZmNGZhZGY6OjMzMGM3MzZlLTExNjctNDBhYS1iZWI4LTIwMWRkMzk5YTYwYzo6JGFhY2hfYTc3ZDc4ZjMtNDU0MC00MjA3LTgyNzQtY2M0ZDY0MGViMzI3
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n

# Resiliência para chamadas ao serviço de notificação (via Gateway/Eureka)
resilience4j.retry.instances.notification.max-attempts=3
resilience4j.retry.instances.notification.wait-duration=500ms
resilience4j.retry.instances.notification.retry-exceptions[0]=org.springframework.web.client.RestClientException
resilience4j.retry.instances.notification.ignore-exceptions[0]=com.cineleo.exception.PaymentProcessingException

resilience4j.circuitbreaker.instances.notification.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.notification.sliding-window-size=10
resilience4j.circuitbreaker.instances.notification.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.notification.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notification.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notification.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.notification.register-health-indicator=true
# Ignorar exceções de negócio (não abrem o circuito)
resilience4j.circuitbreaker.instances.notification.ignore-exceptions[0]=com.cineleo.exception.PaymentProcessingException