spring.application.name=recomendacao-service
server.port=8087

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.restclient.enabled=true

# Banco proprio (Postgres) - mantem o ranking persistido
spring.datasource.url=jdbc:postgresql://localhost:5436/recomendacao_db
spring.datasource.username=recomendacao_user
spring.datasource.password=recomendacao_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka consumer: desserializa o evento de avaliacao no tipo local
# (ignora o header de tipo do produtor e usa o nosso DTO)
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=recomendacao-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.cineleo.recomendacao.dto.AvaliacaoCriadaEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Topico de entrada (evento publicado pelo Avaliacoes)
cineleo.topics.avaliacao-criada=cinema.avaliacao.criada

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Propaga o contexto de trace recebido nos headers da mensagem Kafka
spring.kafka.listener.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n
