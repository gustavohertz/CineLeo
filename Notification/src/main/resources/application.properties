spring.application.name=notification-service
server.port=8000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Kafka Producer
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Propaga o contexto de trace nos headers das mensagens Kafka
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n