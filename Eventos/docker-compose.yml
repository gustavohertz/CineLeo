version: '3.8'

services:
  eventos-db:
    image: postgres:16-alpine
    container_name: cineleo-eventos-db
    environment:
      POSTGRES_DB: eventos_db
      POSTGRES_USER: eventos_user
      POSTGRES_PASSWORD: eventos_pass
    ports:
      - "5434:5432"
    volumes:
      - eventos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventos_user -d eventos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  eventos_data:
    driver: local
