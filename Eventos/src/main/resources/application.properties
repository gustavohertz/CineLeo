spring.application.name=eventos-service
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

server.port=8082

spring.datasource.url=jdbc:postgresql://postgres-eventos:5432/eventos_db
spring.datasource.username=eventos_user
spring.datasource.password=eventos_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

services.usuarios.url=http://usuarios-service:8083
services.pagamento.url=http://paymentService:5000

spring.kafka.producer.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
