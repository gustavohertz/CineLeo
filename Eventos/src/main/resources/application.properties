spring.application.name=eventos-service
server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.restclient.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5434/eventos_db
spring.datasource.username=eventos_user
spring.datasource.password=eventos_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

services.usuarios.url=http://localhost:8083
services.pagamento.url=http://localhost:5000

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Propaga o contexto de trace nos headers das mensagens Kafka
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.metrics.tags.application=${spring.application.name}
management.health.circuitbreakers.enabled=true

# Resiliencia (Resilience4j) nas chamadas internas dos clients (Pagamento/Usuarios).
# As instancias "pagamento" e "usuarios" herdam o config "default".
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
# 404 (usuario nao encontrado) e regra de negocio, nao falha de disponibilidade -> nao conta
resilience4j.circuitbreaker.configs.default.ignore-exceptions[0]=com.cineleo.eventos.exception.ResourceNotFoundException
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=300ms
resilience4j.retry.configs.default.ignore-exceptions[0]=com.cineleo.eventos.exception.ResourceNotFoundException

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n