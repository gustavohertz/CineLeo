version: '3.8'

services:
  postgres-eventos:
    image: postgres:16-alpine
    container_name: postgres-eventos
    environment:
      POSTGRES_DB: eventos_db
      POSTGRES_USER: eventos_user
      POSTGRES_PASSWORD: eventos_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-eventos-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-usuarios:
    image: postgres:16-alpine
    container_name: postgres-usuarios
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: usuarios_user
      POSTGRES_PASSWORD: usuarios_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-usuarios-data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  eureka-server:
    build: ./Eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  usuarios-service:
    build: ./Usuarios
    container_name: usuarios-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - postgres-usuarios
    restart: unless-stopped

  eventos-service:
    build: ./Eventos
    container_name: eventos-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - postgres-eventos
      - kafka
    restart: unless-stopped

  payment-service:
    build: ./Pagamento
    container_name: payment-service
    ports:
      - "5000:5000"
    depends_on:
      - eureka-server
      - notification-service
    restart: unless-stopped

  notification-service:
    build: ./Notification
    container_name: notification-service
    ports:
      - "8000:8000"
    depends_on:
      - eureka-server
      - postgres-notification
    restart: unless-stopped

  microservices-kafka:
    build: ./Kafka
    container_name: microservices-kafka
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - kafka
      - notification-service
    restart: unless-stopped

  observabilidade-service:
    build: ./Observabilidade
    container_name: observabilidade-service
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
    restart: unless-stopped

volumes:
  postgres-eventos-data:
  postgres-usuarios-data:
  postgres-notification-data:
  kafka_data: