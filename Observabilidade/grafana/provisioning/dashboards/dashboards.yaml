# Provider que faz o Grafana carregar os dashboards JSON desta pasta no boot.
apiVersion: 1

providers:
  - name: CineLeo
    type: file
    folder: CineLeo
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
