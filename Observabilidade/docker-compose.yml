version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cineleo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  prometheus_data: {}