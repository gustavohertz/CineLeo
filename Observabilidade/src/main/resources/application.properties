spring.application.name=observabilidade-service
server.port=8090

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.restclient.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Intervalo de checagem dos servicos (ms)
observabilidade.check-interval=30000

# Servicos monitorados (nome no Eureka)
observabilidade.servicos=usuarios-service,eventos-service,paymentService,notification-service,gateway-service,microservices-kafka
