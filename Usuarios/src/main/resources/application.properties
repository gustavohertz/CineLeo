spring.application.name=usuarios-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5435/usuarios_db
spring.datasource.username=usuarios_user
spring.datasource.password=usuarios_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n