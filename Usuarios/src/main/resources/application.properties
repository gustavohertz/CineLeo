spring.application.name=usuarios-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5435/usuarios_db
spring.datasource.username=usuarios_user
spring.datasource.password=usuarios_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing (OpenTelemetry / OTLP -> Tempo)
management.tracing.sampling.probability=1.0
management.tracing.propagation.type=w3c
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.opentelemetry.resource-attributes.service.namespace=cineleo
management.opentelemetry.resource-attributes.deployment.environment=local
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name},%X{traceId:-},%X{spanId:-}] [%thread] %logger{36} - %msg%n

# Resiliência para chamadas ao serviço de pagamento (via Gateway/Eureka)
resilience4j.retry.instances.pagamento.max-attempts=3
resilience4j.retry.instances.pagamento.wait-duration=500ms
resilience4j.retry.instances.pagamento.retry-exceptions[0]=org.springframework.web.client.RestClientException
resilience4j.retry.instances.pagamento.ignore-exceptions[0]=com.cineleo.usuarios.exception.BusinessException

resilience4j.circuitbreaker.instances.pagamento.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.pagamento.sliding-window-size=10
resilience4j.circuitbreaker.instances.pagamento.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.pagamento.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pagamento.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.pagamento.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.pagamento.register-health-indicator=true
resilience4j.circuitbreaker.instances.pagamento.ignore-exceptions[0]=com.cineleo.usuarios.exception.BusinessException

# Expor circuitbreakers no actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers