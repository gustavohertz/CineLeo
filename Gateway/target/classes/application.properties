spring.application.name=api-gateway
server.port=8080

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.restclient.enabled=true

spring.cloud.gateway.mvc.routes[0].id=payment-route
spring.cloud.gateway.mvc.routes[0].uri=lb://paymentService
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/payments/**

spring.cloud.gateway.mvc.routes[1].id=customer-route
spring.cloud.gateway.mvc.routes[1].uri=lb://paymentService
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/customers/**

spring.cloud.gateway.mvc.routes[2].id=kafka-route
spring.cloud.gateway.mvc.routes[2].uri=lb://microservicesKafka
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/kafka/**

