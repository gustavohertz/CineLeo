spring.application.name=api-gateway
server.port=8080

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.restclient.enabled=true

spring.cloud.gateway.routes[0].id=eventos-route
spring.cloud.gateway.routes[0].uri=lb://eventos-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/filmes/**, /sessoes/**, /salas/**, /reservas/**

spring.cloud.gateway.routes[1].id=usuarios-route
spring.cloud.gateway.routes[1].uri=lb://usuarios-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/usuarios/**

spring.cloud.gateway.routes[2].id=payment-route
spring.cloud.gateway.routes[2].uri=lb://paymentService
spring.cloud.gateway.routes[2].predicates[0]=Path=/payments/**, /customers/**

spring.cloud.gateway.routes[3].id=kafka-route
spring.cloud.gateway.routes[3].uri=lb://microservicesKafka
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/kafka/**
