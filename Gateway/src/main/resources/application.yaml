spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8083/.well-known/jwks.json
  cloud:
    gateway:
      mvc:
        routes:
            - id: eventos-service
              uri: lb://EVENTOS-SERVICE
              predicates:
                - Path=/api/eventos/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: eventosCb
                    fallbackUri: forward:/fallback/eventos

            - id: recomendacao-service
              uri: lb://RECOMENDACAO-SERVICE
              predicates:
                - Path=/api/recomendacoes/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: recomendacaoCb
                    fallbackUri: forward:/fallback/recomendacoes

            - id: usuarios-service
              uri: lb://USUARIOS-SERVICE
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: usuariosCb
                    fallbackUri: forward:/fallback/usuarios

            - id: pagamento-service
              uri: lb://PAYMENTSERVICE
              predicates:
                - Path=/api/pagamentos/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: pagamentoCb
                    fallbackUri: forward:/fallback/pagamentos

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notificacoes/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: notificacaoCb
                    fallbackUri: forward:/fallback/notificacoes

            - id: kafka-service
              uri: lb://MICROSERVICESKAFKA
              predicates:
                - Path=/api/kafka/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: kafkaCb
                    fallbackUri: forward:/fallback/kafka

            - id: observabilidade-service
              uri: lb://OBSERVABILIDADE-SERVICE
              predicates:
                - Path=/api/observabilidade/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: observabilidadeCb
                    fallbackUri: forward:/fallback/observabilidade

eureka:
  client:
    restclient:
      enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 9999
  tomcat:
    connection-timeout: 30s

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: http://localhost:4318/v1/traces
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.namespace: cineleo
      deployment.environment: local
  endpoints:
    web:
      exposure:
        include: health,info,gateway,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}] %logger{36} - %msg%n"
  level:
    root: TRACE
    org.springframework.web: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.client.RestClient: DEBUG
    org.springframework.web.servlet.function: DEBUG
    io.micrometer.tracing: DEBUG
    io.opentelemetry: INFO
    org.springframework.http: TRACE
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
    com.cineleo.gateway: DEBUG

# Resiliência (Resilience4j) – apenas para as outras rotas
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  timelimiter:
    configs:
      default:
        timeout-duration: 10s 