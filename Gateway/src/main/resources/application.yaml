spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
            - id: eventos-service
              uri: lb://EVENTOS-SERVICE
              predicates:
                - Path=/api/eventos/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: eventosCb
                    fallbackUri: forward:/fallback/eventos

            - id: usuarios-service
              uri: lb://USUARIOS-SERVICE
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: usuariosCb
                    fallbackUri: forward:/fallback/usuarios

            - id: pagamento-service
              uri: lb://PAYMENTSERVICE
              predicates:
                - Path=/api/pagamentos/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: pagamentoCb
                    fallbackUri: forward:/fallback/pagamentos

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notificacoes/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: notificacaoCb
                    fallbackUri: forward:/fallback/notificacoes

            - id: kafka-service
              uri: lb://MICROSERVICESKAFKA
              predicates:
                - Path=/api/kafka/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: kafkaCb
                    fallbackUri: forward:/fallback/kafka

            - id: observabilidade-service
              uri: lb://OBSERVABILIDADE-SERVICE
              predicates:
                - Path=/api/observabilidade/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    id: observabilidadeCb
                    fallbackUri: forward:/fallback/observabilidade

jwt:
  secret: "${JWT_SECRET:cineleo-chave-secreta-local-123456789012345}"

eureka:
  client:
    restclient:
      enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 9999

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: http://localhost:4318/v1/traces
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      service.namespace: cineleo
      deployment.environment: local
  endpoints:
    web:
      exposure:
        include: health,info,gateway,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] [${spring.application.name}, traceId=%X{traceId:-}, spanId=%X{spanId:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.client.RestClient: DEBUG
    org.springframework.web.servlet.function: DEBUG
    io.micrometer.tracing: DEBUG
    io.opentelemetry: INFO

# Resiliência (Resilience4j) usada pelo filtro CircuitBreaker das rotas.
# Os nomes (eventosCb, usuariosCb, ...) herdam o config "default".
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10                 # avalia as últimas 10 chamadas
        minimum-number-of-calls: 5              # só decide após 5 chamadas
        failure-rate-threshold: 50              # abre o circuito com 50% de falha
        wait-duration-in-open-state: 10s        # fica 10s aberto antes de testar
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  # O CircuitBreaker do Spring Cloud envolve a chamada com um TimeLimiter
  # (default 1s, agressivo demais). Subimos para falhar rápido sem cortar
  # requisições normais.
  timelimiter:
    configs:
      default:
        timeout-duration: 4s
