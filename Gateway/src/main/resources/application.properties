spring.application.name=gateway-service
server.port=8080

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.restclient.enabled=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Rotas especificas
spring.cloud.gateway.routes[0].id=usuarios-service
spring.cloud.gateway.routes[0].uri=lb://usuarios-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/usuarios/**

spring.cloud.gateway.routes[1].id=eventos-service
spring.cloud.gateway.routes[1].uri=lb://eventos-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/eventos/**

spring.cloud.gateway.routes[2].id=paymentService
spring.cloud.gateway.routes[2].uri=lb://paymentService
spring.cloud.gateway.routes[2].predicates[0]=Path=/payments/**, /customers/**
